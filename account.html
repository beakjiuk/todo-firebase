<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가계부 — 일정관리앱</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body class="app-body">
    <div id="appError" class="app-error"></div>

    <div class="app-shell" id="appShell">
      <aside class="app-sidebar" aria-label="메인 메뉴">
        <button
          type="button"
          class="sidebar-toggle"
          id="sidebarToggle"
          aria-expanded="true"
          aria-label="사이드바 접기"
        >
          <span class="sidebar-toggle__icon" aria-hidden="true">‹</span>
        </button>

        <div class="sidebar-brand">
          <span class="sidebar-mark" aria-hidden="true"></span>
          <span class="sidebar-brand__text">일정관리앱</span>
        </div>

        <a class="sidebar-user" id="profileLink" href="profile.html" title="마이페이지">
          <span class="app-avatar app-avatar--sidebar" id="profileAvatar" aria-hidden="true">?</span>
          <div class="sidebar-user__meta">
            <span class="app-nickname sidebar-nickname" id="userNickname">…</span>
            <span class="app-user-email sidebar-email" id="userEmail"></span>
          </div>
        </a>

        <nav class="sidebar-nav">
          <form class="sidebar-search" id="sidebarSearchForm" role="search" action="search.html" method="get">
            <label class="visually-hidden" for="sidebarSearchInput">키워드 검색</label>
            <input
              type="search"
              id="sidebarSearchInput"
              name="q"
              placeholder="검색…"
              maxlength="120"
              autocomplete="off"
            />
            <button type="submit" class="sidebar-search__submit" aria-label="검색">⌕</button>
          </form>
          <a href="app.html" class="sidebar-nav__link">
            <span class="sidebar-nav__ico sidebar-nav__ico--svg" aria-hidden="true"
              ><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" /><path d="M16 2v4M8 2v4M3 10h18" /></svg
            ></span>
            <span class="sidebar-nav__label">할 일</span>
          </a>
          <a href="notes.html" class="sidebar-nav__link">
            <span class="sidebar-nav__ico sidebar-nav__ico--svg" aria-hidden="true"
              ><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><path d="M8 13h8M8 17h6" /></svg
            ></span>
            <span class="sidebar-nav__label">노트</span>
          </a>
          <a href="account.html" class="sidebar-nav__link is-active" aria-current="page">
            <span class="sidebar-nav__ico sidebar-nav__ico--svg" aria-hidden="true"
              ><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2" /><path d="M2 10h20" /></svg
            ></span>
            <span class="sidebar-nav__label">가계부</span>
          </a>
          <a href="profile.html" class="sidebar-nav__link">
            <span class="sidebar-nav__ico sidebar-nav__ico--svg" aria-hidden="true"
              ><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4" /><path d="M4 20a8 8 0 1 1 16 0" /></svg
            ></span>
            <span class="sidebar-nav__label">마이페이지</span>
          </a>
        </nav>

        <button type="button" class="sidebar-logout" id="btnLogout">로그아웃</button>
      </aside>

      <div class="app-content">
        <header class="content-head">
          <h1 class="content-head__title">가계부</h1>
          <p class="content-head__sub">달력에서 날짜를 고르고 수입·지출을 기록해 보세요.</p>
        </header>

        <main class="app-main">
          <div class="ledger-month-bar" id="ledgerMonthBar">
            <div class="ledger-stat">
              <span class="ledger-stat__label">이번 달 수입</span>
              <strong class="ledger-stat__val ledger-stat__val--in" id="monthIncome">0원</strong>
            </div>
            <div class="ledger-stat">
              <span class="ledger-stat__label">이번 달 지출</span>
              <strong class="ledger-stat__val ledger-stat__val--out" id="monthExpense">0원</strong>
            </div>
            <div class="ledger-stat">
              <span class="ledger-stat__label">순액</span>
              <strong class="ledger-stat__val ledger-stat__val--net" id="monthNet">0원</strong>
            </div>
          </div>

          <div class="cal-card ledger-cal">
            <div class="cal-head">
              <h2 id="ledgerCalTitle"></h2>
              <div class="cal-nav">
                <button type="button" id="ledgerPrevMonth" aria-label="이전 달">‹</button>
                <button type="button" id="ledgerNextMonth" aria-label="다음 달">›</button>
              </div>
            </div>
            <div class="cal-weekdays">
              <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
            </div>
            <div class="cal-grid ledger-cal-grid" id="ledgerCalGrid"></div>
          </div>

          <div class="panel">
            <section class="task-card ledger-day-card">
              <h3 id="ledgerDayTitle">내역</h3>
              <ul class="ledger-list" id="ledgerList"></ul>
              <p class="empty-hint" id="ledgerEmptyHint" hidden>이 날짜에는 내역이 없습니다.</p>
              <button type="button" class="btn-add" id="btnAddLedger">내역 추가</button>
            </section>
            <section class="task-card">
              <h3>안내</h3>
              <p class="empty-hint" style="text-align: left; padding: 0">
                금액은 원 단위로 입력합니다. 달력 칸 아래 숫자는 그날의 <strong>수입 − 지출</strong> 순액입니다.
              </p>
            </section>
          </div>
        </main>
      </div>
    </div>

    <div class="modal-backdrop" id="ledgerModal">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="ledgerModalTitle">
        <h3 id="ledgerModalTitle">내역 추가</h3>
        <form id="ledgerForm">
          <div class="modal-field">
            <label for="ledgerType">구분</label>
            <select id="ledgerType" name="type" required>
              <option value="expense">지출</option>
              <option value="income">수입</option>
            </select>
          </div>
          <div class="modal-field">
            <label for="ledgerAmount">금액 (원)</label>
            <input id="ledgerAmount" name="amount" type="number" min="1" step="1" required placeholder="예: 15000" />
          </div>
          <div class="modal-field">
            <label for="ledgerCategory">카테고리</label>
            <select id="ledgerCategory" name="category" required></select>
          </div>
          <div class="modal-field">
            <label for="ledgerDate">날짜</label>
            <input id="ledgerDate" name="date" type="date" required />
          </div>
          <div class="modal-field">
            <label for="ledgerMemo">메모 (선택)</label>
            <textarea id="ledgerMemo" name="memo" maxlength="200"></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" id="ledgerModalCancel">취소</button>
            <button type="submit" class="primary" id="ledgerModalSave">저장</button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script type="module" src="js/account.js"></script>
  </body>
</html>
