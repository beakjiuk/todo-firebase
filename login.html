<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>할꺼지? — 일정관리앱</title>
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body class="auth-body auth-body--split">
    <div class="auth-shell">
      <aside class="auth-hero" aria-hidden="true">
        <div class="auth-hero__inner">
          <div class="auth-hero__task" aria-hidden="true">
            <span class="auth-hero__check"></span>
            <span class="auth-hero__line"></span>
            <span class="auth-hero__line auth-hero__line--short"></span>
          </div>
          <div class="auth-hero__calendar">
            <svg class="auth-hero__cal-svg" viewBox="0 0 140 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="14" y="28" width="112" height="118" rx="14" fill="#fff" stroke="#fecdd3" stroke-width="2" />
              <rect x="14" y="28" width="112" height="34" rx="10" fill="#fdba74" />
              <rect x="36" y="18" width="10" height="22" rx="3" fill="#fca5a5" />
              <rect x="94" y="18" width="10" height="22" rx="3" fill="#fca5a5" />
              <circle cx="42" cy="78" r="3.5" fill="#fda4af" opacity="0.7" />
              <circle cx="100" cy="86" r="3" fill="#fda4af" opacity="0.6" />
              <circle cx="94" cy="118" r="2.5" fill="#fda4af" opacity="0.55" />
              <ellipse cx="70" cy="95" rx="38" ry="34" fill="#fff" stroke="#fde68a" stroke-width="1.5" />
              <ellipse cx="70" cy="92" rx="28" ry="26" fill="#fff" />
              <circle cx="56" cy="88" r="4" fill="#1e293b" />
              <circle cx="84" cy="88" r="4" fill="#1e293b" />
              <circle cx="52" cy="98" r="5" fill="#fed7aa" opacity="0.85" />
              <circle cx="88" cy="98" r="5" fill="#fed7aa" opacity="0.85" />
              <path
                d="M62 104 Q70 110 78 104"
                stroke="#1e293b"
                stroke-width="2"
                fill="none"
                stroke-linecap="round"
              />
            </svg>
          </div>
        </div>
      </aside>

      <div class="auth-main">
        <div class="auth-card">
          <p class="auth-kicker">일정관리의 모든 것!</p>
          <h1 class="auth-brand">할꺼지?</h1>
          <h2 class="auth-heading">로그인</h2>
          <p class="sub">이메일 형식만 맞으면 됩니다. 가짜 주소도 괜찮아요.</p>
          <div id="configBanner" class="config-error-banner">
            <code>js/firebase-config.js</code>에 본인 프로젝트 값을 넣어 주세요.
          </div>
          <div id="authErr" class="auth-error"></div>
          <form id="form">
            <div class="auth-field">
              <label for="email">이메일</label>
              <input id="email" name="email" type="text" inputmode="email" autocomplete="username" required />
            </div>
            <div class="auth-field">
              <label for="password">비밀번호</label>
              <input id="password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <button type="submit" class="btn-auth" id="submitBtn">들어가기</button>
          </form>
          <div class="auth-footer">
            계정이 없나요? <a href="signup.html">회원가입</a>
            · <a href="index.html">처음으로</a>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="js/login.js"></script>
  </body>
</html>
